name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Windows amd64
        run: |
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-H=windowsgui -s -w" \
            -o traycli-windows-amd64.exe .

      - name: Build Windows arm64
        run: |
          GOOS=windows GOARCH=arm64 go build \
            -ldflags "-H=windowsgui -s -w" \
            -o traycli-windows-arm64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## traycli ${{ steps.version.outputs.VERSION }}

            ### Windows

            | Arch | File |
            |------|------|
            | x64 (amd64) | traycli-windows-amd64.exe |
            | ARM64 | traycli-windows-arm64.exe |

            Build from tag: ${{ github.sha }}
          files: |
            traycli-windows-amd64.exe
            traycli-windows-arm64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
